name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Runs on every push and PR — read-only, safe for fork PRs
  build:
    runs-on: macos-15
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4

      # Select the newest Xcode on the runner so the iOS 26 SDK is available.
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set version
        id: version
        run: |
          VERSION="$(date +%Y.%m.%d.%H%M)"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project FPVCam.xcodeproj \
            -scheme FPVCam \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            MARKETING_VERSION="$RELEASE_VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            -archivePath "$RUNNER_TEMP/FPVCam.xcarchive" \
            archive

      - name: Package unsigned IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$RUNNER_TEMP/FPVCam.xcarchive/Products/Applications/FPVCam.app" \
            "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r FPVCam.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPVCam-unsigned
          path: ${{ runner.temp }}/ipa/FPVCam.ipa
          retention-days: 7

  # Runs only on main push — separate job with write access, never triggered by PRs
  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
      IPA_DOWNLOAD_URL: https://github.com/SenulMapa/fpv-cam/releases/latest/download/FPVCam.ipa
    steps:
      - uses: actions/checkout@v4

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: FPVCam-unsigned
          path: /tmp/ipa

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$RELEASE_VERSION" \
            /tmp/ipa/FPVCam.ipa \
            --title "FPV Cam $RELEASE_VERSION" \
            --notes "Unsigned build — sideload via AltStore" \
            --latest

      - name: Update AltStore source.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IPA_PATH="/tmp/ipa/FPVCam.ipa" python3 - <<'EOF'
          import json, os, datetime
          version = os.environ["RELEASE_VERSION"]
          ipa_url = os.environ["IPA_DOWNLOAD_URL"]
          size = os.path.getsize(os.environ["IPA_PATH"])
          with open("source.json") as f:
              src = json.load(f)
          entry = src["apps"][0]["versions"][0]
          entry["version"] = version
          entry["downloadURL"] = ipa_url
          entry["size"] = size
          entry["date"] = datetime.date.today().isoformat()
          with open("source.json", "w") as f:
              json.dump(src, f, indent=2)
          EOF
          git config user.email "ci@github.com"
          git config user.name "CI"
          git add source.json
          git commit -m "chore: update source.json to $RELEASE_VERSION [skip ci]"
          git push
